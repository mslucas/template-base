apiVersion: batch/v1
kind: Job
metadata:
  name: postgresql-databases-bootstrap
  namespace: __K8S_NAMESPACE__
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-bootstrap
          image: registry-1.docker.io/bitnami/postgresql:latest
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-auth
                  key: postgres-password
            - name: PGHOST
              value: postgresql-shared.__K8S_NAMESPACE__.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PROJECT_DATABASES
              valueFrom:
                configMapKeyRef:
                  name: postgresql-databases
                  key: PROJECT_DATABASES
          command: ["/opt/bitnami/scripts/postgresql/entrypoint.sh", "/bin/bash", "-ec"]
          args:
            - |
              for db in ${PROJECT_DATABASES}; do
                exists=$(psql -tAc "SELECT 1 FROM pg_database WHERE datname='${db}'")
                if [ "${exists}" != "1" ]; then
                  echo "creating database ${db}"
                  psql -c "CREATE DATABASE \"${db}\";"
                else
                  echo "database ${db} already exists"
                fi
              done

