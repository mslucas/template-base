apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: __K8S_NAMESPACE__
data:
  config.yaml: |
    model_list:
      - model_name: gpt-4o-mini
        litellm_params:
          model: openai/gpt-4o-mini
          api_key: os.environ/OPENAI_API_KEY
      - model_name: gpt-4.1-mini
        litellm_params:
          model: openai/gpt-4.1-mini
          api_key: os.environ/OPENAI_API_KEY

    litellm_settings:
      drop_params: true
      telemetry: false

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      store_model_in_db: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: __K8S_NAMESPACE__
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: __PROJECT_SLUG__
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/part-of: __PROJECT_SLUG__
    spec:
      serviceAccountName: __PROJECT_SLUG__-workload
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: litellm
          image: docker.litellm.ai/berriai/litellm:main-stable
          imagePullPolicy: IfNotPresent
          args:
            - --config=/app/config/config.yaml
            - --port
            - "4000"
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-auth
                  key: LITELLM_MASTER_KEY
            - name: LITELLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-auth
                  key: LITELLM_SALT_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-auth
                  key: OPENAI_API_KEY
          ports:
            - name: http
              containerPort: 4000
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: litellm-config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: __K8S_NAMESPACE__
  labels:
    app.kubernetes.io/name: litellm
spec:
  selector:
    app.kubernetes.io/name: litellm
  ports:
    - name: http
      port: 4000
      targetPort: http
  type: ClusterIP
