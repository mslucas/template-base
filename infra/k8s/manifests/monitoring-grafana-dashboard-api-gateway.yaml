apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-api-gateway-slo
  namespace: __K8S_NAMESPACE__
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: api-gateway
data:
  api-gateway-slo.json: |
    {
      "id": null,
      "uid": "api-gateway-slo",
      "title": "API Gateway SLO",
      "tags": ["slo", "api-gateway", "template"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request Rate (rps)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(platform_http_server_requests_total{service=\"api-gateway\"}[5m]))",
              "legendFormat": "requests/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Error Rate 5xx (%)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "100 * (sum(rate(platform_http_server_requests_total{service=\"api-gateway\",status=~\"5..\"}[5m])) / clamp_min(sum(rate(platform_http_server_requests_total{service=\"api-gateway\"}[5m])), 1))",
              "legendFormat": "5xx rate",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Latency p95 (s)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(platform_http_server_request_duration_seconds_bucket{service=\"api-gateway\"}[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Availability 5m (%)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "100 * (1 - (sum(rate(platform_http_server_requests_total{service=\"api-gateway\",status=~\"5..\"}[5m])) / clamp_min(sum(rate(platform_http_server_requests_total{service=\"api-gateway\"}[5m])), 1)))",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          }
        }
      ]
    }
