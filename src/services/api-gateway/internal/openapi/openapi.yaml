openapi: 3.0.3
info:
  title: Template API Gateway
  version: 0.1.0
  description: >
    Contrato tecnico inicial do gateway para novos projetos.
    Inclui probes, metadata, websocket de validacao, endpoint protegido com JWT + RBAC
    e tracing distribuido com OpenTelemetry, com camada EDA pronta para publish de eventos.
servers:
  - url: https://__HOST_API__
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive
  /readyz:
    get:
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready
  /api/v1/platform/meta:
    get:
      summary: Platform metadata
      responses:
        '200':
          description: Metadata payload
  /swagger/openapi.yaml:
    get:
      summary: OpenAPI contract
      responses:
        '200':
          description: YAML contract
  /metrics:
    get:
      summary: Prometheus metrics endpoint
      responses:
        '200':
          description: Metrics payload
  /ws:
    get:
      summary: WebSocket echo endpoint
      responses:
        '101':
          description: Switching Protocols
  /api/v1/template/secure:
    get:
      summary: Protected template endpoint
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated request payload
        '401':
          description: Missing or invalid token
        '403':
          description: Insufficient role
  /api/v1/template/events:
    post:
      summary: Publish event to EDA exchange
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_type, payload]
              properties:
                event_type:
                  type: string
                  example: invoice.created
                routing_key:
                  type: string
                  example: platform.api-gateway.invoice.created
                payload:
                  type: object
                  additionalProperties: true
                metadata:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '202':
          description: Event accepted for publishing
        '400':
          description: Invalid request payload
        '401':
          description: Missing or invalid token
        '403':
          description: Insufficient role
        '502':
          description: Broker unavailable
