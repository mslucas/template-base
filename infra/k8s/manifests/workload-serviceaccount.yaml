apiVersion: v1
kind: ServiceAccount
metadata:
  name: __PROJECT_SLUG__-workload
  namespace: __K8S_NAMESPACE__
automountServiceAccountToken: false
imagePullSecrets:
  - name: ghcr-pull-secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: __PROJECT_SLUG__-workload-reader
  namespace: __K8S_NAMESPACE__
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: __PROJECT_SLUG__-workload-reader
  namespace: __K8S_NAMESPACE__
subjects:
  - kind: ServiceAccount
    name: __PROJECT_SLUG__-workload
    namespace: __K8S_NAMESPACE__
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: __PROJECT_SLUG__-workload-reader
