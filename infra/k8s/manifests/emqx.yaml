apiVersion: apps.emqx.io/v2beta1
kind: EMQX
metadata:
  name: emqx
  namespace: __K8S_NAMESPACE__
  labels:
    app.kubernetes.io/name: emqx
    app.kubernetes.io/part-of: __PROJECT_SLUG__
spec:
  image: emqx/emqx:6.1.1
  coreTemplate:
    spec:
      replicas: 3
      minAvailable: 2
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi
      volumeClaimTemplates:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  listenersServiceTemplate:
    spec:
      type: ClusterIP
  dashboardServiceTemplate:
    spec:
      type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: emqx-dashboard-ingress
  namespace: __K8S_NAMESPACE__
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - __HOST_MQTT__
      secretName: __HOST_MQTT__-tls
  rules:
    - host: __HOST_MQTT__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: emqx-dashboard
                port:
                  number: 18083
