apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: __K8S_NAMESPACE__
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64
      batch:
        send_batch_size: 512
        timeout: 5s
      resource:
        attributes:
          - key: service.namespace
            action: upsert
            value: __PROJECT_SLUG__
          - key: k8s.namespace.name
            action: upsert
            value: __K8S_NAMESPACE__
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    exporters:
      otlp/tempo:
        endpoint: __OTEL_BACKEND_OTLP_ENDPOINT__
        tls:
          insecure: __OTEL_BACKEND_OTLP_INSECURE__
      debug:
        verbosity: normal
    service:
      extensions: [health_check]
      telemetry:
        logs:
          level: info
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlp/tempo, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: __K8S_NAMESPACE__
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: __PROJECT_SLUG__
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: __PROJECT_SLUG__
    spec:
      serviceAccountName: __PROJECT_SLUG__-workload
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.111.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/conf/otel-collector-config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: __K8S_NAMESPACE__
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: otel-collector
  namespace: __K8S_NAMESPACE__
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
