apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: __K8S_NAMESPACE__
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api-gateway
          env:
            - name: OTEL_ENVIRONMENT
              value: dev
            - name: OTEL_TRACES_SAMPLER_RATIO
              value: "1.0"
